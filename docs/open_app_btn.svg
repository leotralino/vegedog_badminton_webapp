<svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" role="img" aria-label="打开菜狗 App">
  <title>打开菜狗 App</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1db954"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect rx="5" width="120" height="32" fill="url(#bg)"/>
  <!-- Right-pointing triangle on the left -->
  <polygon points="11,11 11,21 18,16" fill="white" opacity="0.9"/>
  <!-- Text shifted right to sit next to triangle -->
  <text x="67" y="21"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="white" text-anchor="middle"
        letter-spacing="0.3">打开菜狗 App</text>
</svg>
